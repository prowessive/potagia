services:
  db:
    image: postgres:15-alpine
    container_name: postgres_potagia
    restart: always
    environment:
      - POSTGRES_USER=usuario
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: